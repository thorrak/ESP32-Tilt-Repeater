# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Build

on:
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4.1.1

    - run: git fetch --prune --unshallow

    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cache PlatformIO
      uses: actions/cache@v4
      with:
        path: ~/.platformio
        key: ${{ runner.os }}-pio

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
          python-version: "3.13"

    - name: Install PIO
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade platformio

    - name: Build
      run: |
        pio run -e esp32dev

    - name: Copy files
      run: |
        if [ -f .pio/build/esp32dev/firmware.bin ]; then
        cp .pio/build/esp32dev/firmware.bin bin/esp32dev_firmware.bin
        fi
        if [ -f .pio/build/esp32dev/partitions.bin ]; then
        cp .pio/build/esp32dev/partitions.bin bin/esp32dev_partitions.bin
        fi

    - name: Create Draft Release
      uses: softprops/action-gh-release@v1
      with:
        body: "Draft release"
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: true
        prerelease: true
        files: |
          LICENSE
          bin/*.bin
      env:
        GITHUB_REPOSITORY: thorrak/ESP32-Tilt-Repeater
